<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogos DGII - DerejFact Admin</title>
    <script src="/js/icono-global.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/forms.js"></script>
    <script src="../js/layout.js"></script>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar"></aside>
        <div class="main-wrapper">
            <header class="topbar" id="topbar"></header>
            <main class="main-content" id="mainContent">
                
                <div class="page-header">
                    <div class="page-header-left">
                        <h1 class="page-title">Catálogos DGII</h1>
                        <p class="page-subtitle">Tablas oficiales de la DGII para e-CF (Tablas I–IV)</p>
                    </div>
                    <div class="page-actions">
                        <button class="btn btn-primary" id="btnNew">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                            </svg>
                            Nuevo
                        </button>
                    </div>
                </div>

                <div class="tabs" id="tabBar">
                    <button class="tab-btn active" data-tab="provincias">Provincias</button>
                    <button class="tab-btn" data-tab="municipios">Municipios</button>
                    <button class="tab-btn" data-tab="unidades-medida">Unidades Medida</button>
                    <button class="tab-btn" data-tab="monedas">Monedas</button>
                    <button class="tab-btn" data-tab="impuestos-adicionales">Impuestos</button>
                    <button class="tab-btn" data-tab="formas-pago">Formas Pago</button>
                </div>

                <div class="filter-bar">
                    <div class="search-wrapper">
                        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        </svg>
                        <input type="text" id="searchInput" class="search-input" placeholder="Buscar...">
                    </div>
                </div>

                <div class="table-wrapper">
                    <div class="table-header-bar">
                        <h3 class="table-title" id="tableTitle">Provincias <span class="table-count" id="tableCount">(0)</span></h3>
                    </div>
                    <div style="overflow-x: auto;">
                        <table class="data-table">
                            <thead id="tableHead">
                                <tr id="headerRow"></tr>
                            </thead>
                            <tbody id="dataTableBody">
                                <!-- Contenido dinámico -->
                            </tbody>
                        </table>
                    </div>
                    <div class="pagination-bar" id="paginationBar">
                        <span class="pagination-info" id="paginationInfo">Mostrando 0 registros</span>
                        <div class="pagination-controls">
                            <button class="pagination-btn" id="btnPrevPage" disabled>‹</button>
                            <div class="pagination-pages" id="paginationPages"></div>
                            <button class="pagination-btn" id="btnNextPage" disabled>›</button>
                        </div>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <!-- Modal Form -->
    <div class="modal-overlay" id="modalForm">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">Nuevo</h3>
                <button class="modal-close" id="btnCloseModal">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <form id="dataForm" class="form-grid" novalidate>
                    <input type="hidden" id="entityCode">
                    <div id="formFields"></div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-ghost" id="btnCancelModal">Cancelar</button>
                <button type="button" class="btn btn-primary" id="btnSaveModal">Guardar</button>
            </div>
        </div>
    </div>

    <!-- Modal Confirmar Eliminar -->
    <div class="modal-overlay" id="modalConfirmDelete">
        <div class="modal confirm-dialog">
            <div class="modal-body">
                <div class="confirm-icon danger">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                    </svg>
                </div>
                <h3 style="margin-bottom: 8px; color: var(--text);">Eliminar</h3>
                <p class="confirm-text" id="confirmDeleteText">¿Está seguro de eliminar este registro?</p>
            </div>
            <div class="modal-footer" style="justify-content: center;">
                <button type="button" class="btn btn-ghost" id="btnCancelDelete">Cancelar</button>
                <button type="button" class="btn btn-danger" id="btnConfirmDelete">Eliminar</button>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script src="../js/pages/catalogos-dgii.js"></script>
</body>
</html>
