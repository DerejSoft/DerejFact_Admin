<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empresas - DerejFact Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/layout.js"></script>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar"></aside>
        <div class="main-wrapper">
            <header class="topbar" id="topbar"></header>
            <main class="main-content" id="mainContent">
                
                <div class="page-header">
                    <div class="page-header-left">
                        <h1 class="page-title">Empresas</h1>
                        <p class="page-subtitle">Gestión de tenants y emisores electrónicos</p>
                    </div>
                    <div class="page-actions">
                        <button class="btn btn-primary" id="btnNew">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                            </svg>
                            Nueva Empresa
                        </button>
                    </div>
                </div>

                <div class="filter-bar">
                    <div class="search-wrapper">
                        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        </svg>
                        <input type="text" id="searchInput" class="search-input" placeholder="Buscar por RNC o Razón Social...">
                    </div>
                </div>

                <div class="table-wrapper">
                    <div class="table-header-bar">
                        <h3 class="table-title">Listado de Empresas <span class="table-count" id="tableCount">(0)</span></h3>
                    </div>
                    <div style="overflow-x: auto;">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>RNC</th>
                                    <th>Razón Social</th>
                                    <th>Ambiente</th>
                                    <th>Estado</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="dataTableBody">
                                <!-- Contenido dinámico -->
                            </tbody>
                        </table>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <!-- Modal Form -->
    <div class="modal-overlay" id="modalForm">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">Nueva Empresa</h3>
                <button class="modal-close" id="btnCloseModal">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <form id="dataForm" class="form-grid">
                    <input type="hidden" id="entityId">
                    
                    <div class="form-group">
                        <label class="form-label" for="rnc">RNC <span class="required">*</span></label>
                        <input type="text" id="rnc" class="form-input" required pattern="[0-9]{9,11}">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="razon_social">Razón Social <span class="required">*</span></label>
                        <input type="text" id="razon_social" class="form-input" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="nombre_comercial">Nombre Comercial</label>
                        <input type="text" id="nombre_comercial" class="form-input">
                    </div>

                    <div class="form-grid-2">
                        <div class="form-group">
                            <label class="form-label" for="ambiente">Ambiente <span class="required">*</span></label>
                            <select id="ambiente" class="form-select" required>
                                <option value="testecf">TesteCF (Desarrollo)</option>
                                <option value="certecf">CerteCF (Certificación)</option>
                                <option value="produccion">Producción</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="estado">Estado Certificado</label>
                            <select id="estado" class="form-select">
                                <option value="PENDIENTE_CERTIFICADO">Pendiente de Certificado</option>
                                <option value="CONFIGURADO">Configurado</option>
                            </select>
                        </div>
                    </div>

                    <label class="form-check" style="margin-top: 10px;">
                        <input type="checkbox" id="activa" checked>
                        <span class="form-check-label">Empresa Activa</span>
                    </label>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-ghost" id="btnCancelModal">Cancelar</button>
                <button type="button" class="btn btn-primary" id="btnSaveModal">Guardar</button>
            </div>
        </div>
    </div>

    <!-- Script de la página -->
    <script src="../js/pages/empresas.js"></script>
</body>
</html>
