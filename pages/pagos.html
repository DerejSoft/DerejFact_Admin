<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagos - DerejFact Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/layout.js"></script>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar"></aside>
        <div class="main-wrapper">
            <header class="topbar" id="topbar"></header>
            <main class="main-content" id="mainContent">
                
                <div class="page-header">
                    <div class="page-header-left">
                        <h1 class="page-title">Pagos y Facturación</h1>
                        <p class="page-subtitle">Verificación de pagos por suscripciones o paquetes extra</p>
                    </div>
                    <div class="page-actions">
                        <button class="btn btn-primary" id="btnNew">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                            </svg>
                            Registrar Pago
                        </button>
                    </div>
                </div>

                <div class="filter-bar">
                    <div class="search-wrapper" style="flex: 2;">
                        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        </svg>
                        <input type="text" id="searchInput" class="search-input" placeholder="Buscar por RNC, empresa o referencia de pago...">
                    </div>
                    <div style="flex: 1;">
                        <select id="empresaFilter" class="form-select">
                            <option value="">Todas las empresas</option>
                        </select>
                    </div>
                </div>

                <div class="tabs">
                    <button class="tab-btn active" data-tab="todos">Todos</button>
                    <button class="tab-btn" data-tab="pendientes">Pendientes</button>
                    <button class="tab-btn" data-tab="historial">Historial</button>
                </div>

                <div class="table-wrapper">
                    <div class="table-header-bar">
                        <h3 class="table-title">Listado de Pagos <span class="table-count" id="tableCount">(0)</span></h3>
                    </div>
                    <div style="overflow-x: auto;">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Empresa</th>
                                    <th>Monto</th>
                                    <th>Método</th>
                                    <th>Referencia</th>
                                    <th>Fecha Pago</th>
                                    <th>Estado</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="dataTableBody">
                                <!-- Contenido dinámico -->
                            </tbody>
                        </table>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <!-- Modal Acción Pago (Confirmar / Rechazar) -->
    <div class="modal-overlay" id="modalAccionPago">
        <div class="modal confirm-dialog">
            <div class="modal-body">
                <div class="confirm-icon info" id="accionIcon">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
                <h3 style="margin-bottom: 12px; color: var(--text);" id="accionTitle">Acción sobre Pago</h3>
                <p class="confirm-text" id="accionText">Confirme que desea realizar esta acción.</p>
            </div>
            <div class="modal-footer" style="justify-content: center;">
                <button type="button" class="btn btn-ghost" id="btnCancelAccion">Cancelar</button>
                <button type="button" class="btn btn-primary" id="btnConfirmAccion">Confirmar</button>
            </div>
        </div>
    </div>

    <!-- Modal Form (Registrar Pago) -->
    <div class="modal-overlay" id="modalForm">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">Registrar Pago Manual</h3>
                <button class="modal-close" id="btnCloseModal">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <form id="dataForm" class="form-grid">
                    <input type="hidden" id="entityId">
                    
                    <div class="form-group">
                        <label class="form-label" for="empresa">Empresa <span class="required">*</span></label>
                        <select id="empresa" class="form-select" required>
                            <option value="">Seleccione una empresa...</option>
                        </select>
                    </div>

                    <div class="form-grid-2">
                        <div class="form-group">
                            <label class="form-label" for="suscripcion">Suscripción</label>
                            <select id="suscripcion" class="form-select" disabled>
                                <option value="">Seleccione la empresa primero...</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="plan">Plan</label>
                            <select id="plan" class="form-select" disabled>
                                <option value="">Seleccione la empresa primero...</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-grid-2">
                        <div class="form-group">
                            <label class="form-label" for="monto">Monto <span class="required">*</span></label>
                            <input type="number" id="monto" class="form-input" step="0.01" min="0.01" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="moneda">Moneda <span class="required">*</span></label>
                            <select id="moneda" class="form-select" required>
                                <option value="DOP" selected>DOP</option>
                                <option value="USD">USD</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-grid-2">
                        <div class="form-group">
                            <label class="form-label" for="metodo_pago">Método de Pago <span class="required">*</span></label>
                            <select id="metodo_pago" class="form-select" required>
                                <option value="TRANSFERENCIA">Transferencia / Depósito</option>
                                <option value="EFECTIVO">Efectivo</option>
                                <option value="TARJETA">Tarjeta de Crédito</option>
                                <option value="OTRO">Otro</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="referencia">Referencia</label>
                            <input type="text" id="referencia" class="form-input" placeholder="Nro de transacción">
                        </div>
                    </div>

                    <div class="form-grid-2">
                        <div class="form-group">
                            <label class="form-label" for="fecha_pago">Fecha de Pago <span class="required">*</span></label>
                            <input type="datetime-local" id="fecha_pago" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="fecha_corte">Día de Corte</label>
                            <input type="number" id="fecha_corte" class="form-input" min="1" max="31" placeholder="Día del mes (1-31)">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="observaciones">Observaciones</label>
                        <textarea id="observaciones" class="form-textarea" rows="2" placeholder="Nota adicional sobre el pago..."></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-ghost" id="btnCancelModal">Cancelar</button>
                <button type="button" class="btn btn-primary" id="btnSaveModal">Registrar Pago</button>
            </div>
        </div>
    </div>

    <script src="../js/pages/pagos.js"></script>
</body>
</html>
