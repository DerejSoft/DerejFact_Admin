<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paquetes de Comprobantes - DerejFact Admin</title>
    <script src="/js/icono-global.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/layout.js"></script>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar"></aside>
        <div class="main-wrapper">
            <header class="topbar" id="topbar"></header>
            <main class="main-content" id="mainContent">
                
                <div class="page-header">
                    <div class="page-header-left">
                        <h1 class="page-title">Paquetes de Comprobantes</h1>
                        <p class="page-subtitle">Monitoreo y asignación de e-CFs disponibles por empresa</p>
                    </div>
                    <div class="page-actions">
                        <button class="btn btn-primary" id="btnNew">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
                            </svg>
                            Nuevo Paquete
                        </button>
                    </div>
                </div>

                <div class="filter-bar">
                    <div class="search-wrapper">
                        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        </svg>
                        <input type="text" id="searchInput" class="search-input" placeholder="Buscar por nombre de empresa...">
                    </div>
                </div>

                <div class="table-wrapper">
                    <div class="table-header-bar">
                        <h3 class="table-title">Listado de Paquetes <span class="table-count" id="tableCount">(0)</span></h3>
                    </div>
                    <div style="overflow-x: auto;">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Empresa</th>
                                    <th>Plan / Origen</th>
                                    <th>Uso de Comprobantes</th>
                                    <th>Vencimiento</th>
                                    <th>Estado</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="dataTableBody">
                                <!-- Contenido dinámico -->
                            </tbody>
                        </table>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <!-- Modal Form -->
    <div class="modal-overlay" id="modalForm">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">Nuevo Paquete</h3>
                <button class="modal-close" id="btnCloseModal">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <form id="dataForm" class="form-grid">
                    <input type="hidden" id="entityId">
                    
                    <div class="form-group">
                        <label class="form-label" for="empresa">Empresa <span class="required">*</span></label>
                        <select id="empresa" class="form-select" required>
                            <option value="">Seleccione una empresa...</option>
                        </select>
                    </div>

                    <div class="form-grid-2">
                        <div class="form-group" id="group_suscripcion">
                            <label class="form-label" for="suscripcion">Suscripción Asociada</label>
                            <select id="suscripcion" class="form-select" disabled>
                                <option value="">Seleccione la empresa primero...</option>
                            </select>
                        </div>
                        <div class="form-group" id="group_plan">
                            <label class="form-label" for="plan">Plan Asociado</label>
                            <select id="plan" class="form-select" disabled>
                                <option value="">Seleccione la empresa primero...</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-grid-2">
                        <div class="form-group">
                            <label class="form-label" for="total_comprobantes">Total Comprobantes <span class="required">*</span></label>
                            <input type="number" id="total_comprobantes" class="form-input" min="1" required>
                        </div>
                        <div class="form-group" id="group_comprobantes_usados">
                            <label class="form-label" for="comprobantes_usados">Comprobantes Usados <span class="required">*</span></label>
                            <input type="number" id="comprobantes_usados" class="form-input" min="0" value="0" required>
                        </div>
                    </div>

                    <div class="form-grid-2">
                        <div class="form-group">
                            <label class="form-label" for="origen">Origen <span class="required">*</span></label>
                            <select id="origen" class="form-select" required>
                                <option value="SUSCRIPCION">Suscripción</option>
                                <option value="COMPRA_EXTRA">Compra Extra</option>
                                <option value="CORTESIA">Cortesía / Regalo</option>
                            </select>
                        </div>
                        <div class="form-group" id="group_estado">
                            <label class="form-label" for="estado">Estado <span class="required">*</span></label>
                            <select id="estado" class="form-select" required>
                                <option value="PENDIENTE">Pendiente</option>
                                <option value="ACTIVO">Activo</option>
                                <option value="AGOTADO">Agotado</option>
                                <option value="VENCIDO">Vencido</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="fecha_vencimiento">Fecha de Vencimiento <span class="required">*</span></label>
                        <input type="datetime-local" id="fecha_vencimiento" class="form-input" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-ghost" id="btnCancelModal">Cancelar</button>
                <button type="button" class="btn btn-primary" id="btnSaveModal">Guardar</button>
            </div>
        </div>
    </div>

    <script src="../js/pages/paquetes.js"></script>
</body>
</html>
