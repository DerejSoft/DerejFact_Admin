<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contraseña - DerejFact Admin</title>
    <script src="../js/config.js"></script>
    <script src="/js/icono-global.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../index.css">
    <style>
        .recover-card { max-width: 420px; }
        .recover-subtitle { text-align: center; color: var(--text-muted); font-size: 0.88rem; margin: -16px 0 24px; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-overlay"></div>
        <div class="login-card card recover-card">

            <div class="login-header">
                <div class="login-logo">
                    <img src="/public/img/logo-p.ico" alt="DerejFact" />
                </div>
                <h1 class="login-title">Recuperar contraseña</h1>
                <p class="login-subtitle">Te enviaremos instrucciones para restablecer el acceso</p>
            </div>

            <div id="recoverFormView">
                <form id="recoverForm" class="login-form" novalidate>
                    <div class="form-group">
                        <label class="form-label" for="email">Correo Electrónico</label>
                        <input type="email" id="email" name="email" class="form-input" placeholder="admin@ejemplo.com" required autocomplete="email">
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary btn-submit" id="submitBtn">
                            <span class="btn-text">Enviar instrucciones</span>
                            <div class="spinner-inline hidden" id="submitSpinner">
                                <svg class="spinner" viewBox="0 0 50 50">
                                    <circle class="path" cx="25" cy="25" r="20" fill="none" stroke-width="5"></circle>
                                </svg>
                            </div>
                        </button>
                    </div>
                </form>
            </div>

            <div id="recoverSuccessView" class="hidden">
                <div class="recover-success">
                    <div class="success-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                    </div>
                    <h2>Revisa tu bandeja</h2>
                    <p>Si el correo existe en nuestro sistema, te enviamos un enlace para restablecer tu contraseña.</p>
                    <button type="button" class="btn btn-outline" id="btnResend" disabled>
                        <span id="resendText">Reenviar</span> <span id="resendCountdown" class="countdown-text">(<b>60</b>s)</span>
                    </button>
                </div>
            </div>

            <div class="login-footer">
                <a href="../index.html" class="link-recover">← Volver al inicio de sesión</a>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script src="../js/auth.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/forms.js"></script>
    <script src="../js/recover.js"></script>
</body>
</html>
