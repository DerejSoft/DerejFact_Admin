<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios - DerejFact Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/layout.js"></script>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar"></aside>
        <div class="main-wrapper">
            <header class="topbar" id="topbar"></header>
            <main class="main-content" id="mainContent">
                
                <div class="page-header">
                    <div class="page-header-left">
                        <h1 class="page-title">Usuarios</h1>
                        <p class="page-subtitle">Gestión de acceso de administradores y clientes</p>
                    </div>
                    <div class="page-actions">
                        <button class="btn btn-primary" id="btnNew">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
                            </svg>
                            Nuevo Usuario
                        </button>
                    </div>
                </div>

                <div class="filter-bar">
                    <div class="search-wrapper">
                        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        </svg>
                        <input type="text" id="searchInput" class="search-input" placeholder="Buscar por email o nombre...">
                    </div>
                </div>

                <div class="table-wrapper">
                    <div class="table-header-bar">
                        <h3 class="table-title">Listado de Usuarios <span class="table-count" id="tableCount">(0)</span></h3>
                    </div>
                    <div style="overflow-x: auto;">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Email</th>
                                    <th>Nombre</th>
                                    <th>Rol</th>
                                    <th>Empresa</th>
                                    <th>Estado</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="dataTableBody">
                                <!-- Contenido dinámico -->
                            </tbody>
                        </table>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <!-- Modal Form -->
    <div class="modal-overlay" id="modalForm">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">Nuevo Usuario</h3>
                <button class="modal-close" id="btnCloseModal">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <form id="dataForm" class="form-grid">
                    <input type="hidden" id="entityId">
                    
                    <div class="form-group">
                        <label class="form-label" for="email">Correo Electrónico <span class="required">*</span></label>
                        <input type="email" id="email" class="form-input" required>
                    </div>

                    <div class="form-grid-2">
                        <div class="form-group">
                            <label class="form-label" for="nombre">Nombre <span class="required">*</span></label>
                            <input type="text" id="nombre" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="apellido">Apellido <span class="required">*</span></label>
                            <input type="text" id="apellido" class="form-input" required>
                        </div>
                    </div>

                    <div class="form-grid-2">
                        <div class="form-group">
                            <label class="form-label" for="rol">Rol <span class="required">*</span></label>
                            <select id="rol" class="form-select" required>
                                <option value="ADMIN_EMPRESA">Administrador de Empresa</option>
                                <option value="SUPERADMIN">Super Admin (Global)</option>
                            </select>
                        </div>
                        <div class="form-group" id="empresaContainer">
                            <label class="form-label" for="empresa">Empresa</label>
                            <select id="empresa" class="form-select">
                                <option value="">Seleccione una empresa...</option>
                                <!-- Dinámico -->
                            </select>
                        </div>
                    </div>

                    <div class="form-group" id="passwordContainer">
                        <label class="form-label" for="password">Contraseña <span class="required" id="passRequired">*</span></label>
                        <input type="text" id="password" class="form-input" placeholder="Mínimo 8 caracteres">
                        <span class="form-hint" id="passHint">Para editar, déjalo en blanco si no quieres cambiarla.</span>
                    </div>

                    <label class="form-check" style="margin-top: 10px;">
                        <input type="checkbox" id="is_active" checked>
                        <span class="form-check-label">Usuario Activo</span>
                    </label>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-ghost" id="btnCancelModal">Cancelar</button>
                <button type="button" class="btn btn-primary" id="btnSaveModal">Guardar</button>
            </div>
        </div>
    </div>

    <script src="../js/pages/usuarios.js"></script>
</body>
</html>
